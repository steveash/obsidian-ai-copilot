name: Release Bundle Check

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-ai-copilot-dist
          path: dist/
